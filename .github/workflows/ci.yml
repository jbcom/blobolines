name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Biome lint + format check
        run: pnpm lint

      - name: TypeScript check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Web build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Browser fixture tests
        run: pnpm test:browser

      - name: Upload fixture screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fixture-screenshots
          path: __screenshots__/
          if-no-files-found: ignore
          retention-days: 14

  android:
    name: Android debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v4

      - run: pnpm install --frozen-lockfile

      - name: Build web (native base) + sync Capacitor
        run: |
          # Only suppress the known "platform already added" case; surface real errors.
          pnpm exec cap add android || [ -d android ]
          pnpm cap:sync

      - name: Assemble debug APK
        run: cd android && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v7
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 14
